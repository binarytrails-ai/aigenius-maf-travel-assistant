name: agent-builder-workshop

services:
  mcp-server:
    project: src/mcp
    language: csharp
    host: containerapp
    docker:
      path: ./Dockerfile
      context: ../

  backend:
    project: src/backend
    language: csharp
    host: containerapp
    docker:
      path: ./Dockerfile
      context: ../

  frontend:
    project: src/frontend
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      context: ./

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  preup:
    posix:
      shell: sh
      run: chmod u+r+x ./scripts/validate_env_vars.sh; ./scripts/validate_env_vars.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./scripts/validate_env_vars.ps1
      interactive: true
      continueOnError: false

  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/write_env.ps1
      continueOnError: true
      interactive: true
    posix:
      shell: sh
      run: chmod u+r+x ./scripts/write_env.sh; ./scripts/write_env.sh
      continueOnError: true
      interactive: true